<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting Tourishq Travel Solutions. We will get back to you within 4 hours.">
    <title>Thank You | Tourishq Travel Solutions</title>

    <link rel="icon" type="image/svg+xml" href="images/tourishq-icon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #1a1a1a; color: #fff; }
        h1,h2,h3 { font-family: 'Montserrat', sans-serif; font-weight: 700; }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen flex flex-col">
    <script>window.pagePath = '';</script>
    <div id="header-placeholder"></div>

    <main class="flex-1 flex items-center justify-center px-4 py-24">
        <div class="text-center max-w-lg mx-auto">
            <div class="w-24 h-24 bg-[#009E83]/10 border-2 border-[#009E83]/30 rounded-full flex items-center justify-center mx-auto mb-8">
                <i class="fas fa-check-circle text-5xl text-[#009E83]"></i>
            </div>
            <h1 class="text-4xl md:text-5xl font-black text-white mb-4">Thank You!</h1>
            <p class="text-lg text-gray-400 mb-2">Your enquiry has been received.</p>
            <p class="text-gray-500 mb-10">Our travel architect will call you back within <span class="text-[#FFBC00] font-semibold">4 hours</span> to craft your perfect itinerary.</p>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-10">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                    <i class="fas fa-headset text-2xl text-[#FFBC00] mb-2"></i>
                    <p class="text-sm text-gray-400">Free Consultation</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                    <i class="fas fa-pen-fancy text-2xl text-[#FFBC00] mb-2"></i>
                    <p class="text-sm text-gray-400">100% Customizable</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                    <i class="fas fa-shield-alt text-2xl text-[#FFBC00] mb-2"></i>
                    <p class="text-sm text-gray-400">No Hidden Fees</p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="destinations/index.html" class="inline-flex items-center justify-center gap-2 bg-[#009E83] text-white font-bold px-6 py-3 rounded-xl hover:bg-[#007a66] transition">
                    <i class="fas fa-compass"></i> Browse Destinations
                </a>
                <a href="index.html" class="inline-flex items-center justify-center gap-2 bg-white/5 border border-white/15 text-white font-bold px-6 py-3 rounded-xl hover:bg-white/10 transition">
                    <i class="fas fa-home"></i> Back to Home
                </a>
            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>
    <script src="js/components.js" defer></script>
</body>
</html>
